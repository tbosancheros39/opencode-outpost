version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  bot:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - ./data:/app/.data
    restart: unless-stopped

volumes:
  redis-data:
